paper_trader:
  enabled: true
  starting_balance: 1000.00

  # Risk Profile: conservative | moderate | aggressive
  # Conservative: 1% risk, $20 target, $15 loss limit, 2 trades, 1:2 R:R
  # Moderate:     3% risk, $50 target, $30 loss limit, 3 trades, 1:2.5 R:R  (current)
  # Aggressive:   5% risk, $80 target, $50 loss limit, 5 trades, 1:3 R:R
  risk_profile: moderate

  risk_per_trade_pct: 3.0
  max_concurrent_positions: 3
  max_hold_days: 1

  daily_gain_target: 50.0
  daily_loss_limit: 30.0
  auto_close_eod: true

  entry_signals:
    - STRONG_BUY
    - STRONG_SELL
    - BUY
    - SELL

  stop_loss:
    method: atr
    atr_multiplier: 1.5

  take_profit:
    method: atr
    atr_multiplier: 3.0

  # Max total notional exposure as multiple of account balance
  max_daily_exposure_mult: 3.0

  # Per-instrument daily realized loss limit ($)
  instrument_daily_loss_limit: 15.0

  pdt_simulation: true
  pdt_day_trade_limit: 10
  auto_enter: true
